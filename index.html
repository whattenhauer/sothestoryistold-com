<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>So The Story Is Told - Turn Your Story Into Animated Reels</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>So The Story Is Told</h1>
    <p>Turn your personal stories into beautiful illustrated animated reels</p>
  </header>

  <main>
    <section class="story-form">
      <h2>Tell Your Story</h2>
      <form id="storyForm">
        <textarea id="userStory" rows="6" placeholder="Write your short story or message here... (e.g. 'Dear Sarah, I'm so proud of you for...')"></textarea>
        
        <div class="options">
          <input type="text" id="recipient" placeholder="Recipient's name (optional)">
          <select id="occasion">
            <option value="">Select Occasion</option>
            <option value="birthday">Birthday</option>
            <option value="graduation">Graduation</option>
            <option value="love">Love / Anniversary</option>
            <option value="encouragement">Encouragement</option>
            <option value="thankyou">Thank You</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button type="submit">Generate Storyboard & Reel →</button>
      </form>
    </section>

    <div id="preview" class="preview-area" style="display:none;">
      <h3>Your Storyboard Preview</h3>
      <div id="scenes"></div>
      <button id="generateVideo">Generate Full Animated Reel</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
